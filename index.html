<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>StartWise — Across the Table</title>

<!-- Brand fonts: direct link (more reliable than @import, esp. in previews/file://) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B344F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="StartWise">
<link rel="apple-touch-icon" href="assets/icon-192.png">

<!-- Design system inlined so it is fully self-contained (no external CSS dependency) -->
<style>
/* Across the Table — Color tokens
   Navy (trust/authority) + Forest (growth) + Gold (warmth/optimism) on warm neutrals. */
:root {
  /* --- Navy: primary brand --- */
  --navy-950: #0B1623;
  --navy-900: #0E1B2C;
  --navy-800: #14283F;
  --navy-700: #1B344F;   /* primary */
  --navy-600: #244463;
  --navy-500: #34597A;
  --navy-100: #DCE4ED;
  --navy-050: #EEF2F6;

  /* --- Forest: secondary brand (growth) --- */
  --forest-800: #143C2D;
  --forest-700: #1C4D3A;
  --forest-600: #246049;  /* secondary */
  --forest-500: #2F7558;
  --forest-100: #D7E6DE;
  --forest-050: #EBF3EF;

  /* --- Gold: accent (warmth, highlight) --- */
  --gold-700: #946312;
  --gold-600: #B07D1E;
  --gold-500: #C8962E;    /* accent */
  --gold-400: #DCB04F;
  --gold-100: #F4E7C8;
  --gold-050: #FAF3E1;

  /* --- Warm neutrals: surfaces --- */
  --cream-50: #FBF8F2;
  --cream-100: #F4EFE5;
  --sand-200: #E9E1D2;
  --sand-300: #D9CEBA;

  /* --- Ink: cool slate text/UI greys --- */
  --ink-900: #15202E;
  --ink-800: #233242;
  --ink-700: #344150;
  --ink-600: #4C5A69;
  --ink-500: #647281;
  --ink-400: #8593A0;
  --ink-300: #AEB9C3;
  --ink-200: #D2D9DF;
  --ink-100: #E7EBEF;
  --white: #FFFFFF;

  /* --- Functional --- */
  --red-600: #A8392B;
  --red-100: #F3DCD7;
  --red-050: #FBEEEB;

  /* ===== Semantic aliases ===== */
  --brand-primary: var(--navy-700);
  --brand-primary-hover: var(--navy-800);
  --brand-primary-active: var(--navy-900);
  --brand-secondary: var(--forest-600);
  --brand-secondary-hover: var(--forest-700);
  --brand-accent: var(--gold-500);
  --brand-accent-hover: var(--gold-600);

  --bg-page: var(--cream-50);
  --bg-page-alt: var(--cream-100);
  --bg-dark: var(--navy-900);
  --surface-card: var(--white);
  --surface-sunken: var(--cream-100);
  --surface-raised: var(--white);

  --text-strong: var(--ink-900);
  --text-body: var(--ink-700);
  --text-muted: var(--ink-500);
  --text-faint: var(--ink-400);
  --text-on-dark: var(--cream-50);
  --text-on-dark-muted: #A9B7C6;
  --text-accent: var(--gold-700);
  --text-link: var(--navy-600);

  --border-subtle: #ECE6DA;
  --border-default: #E0D9CB;
  --border-strong: #CFC6B4;
  --border-dark: rgba(255,255,255,0.14);
  --focus-ring: var(--gold-500);

  --success: var(--forest-600);
  --success-bg: var(--forest-050);
  --success-border: var(--forest-100);
  --warning: var(--gold-600);
  --warning-bg: var(--gold-050);
  --warning-border: var(--gold-100);
  --danger: var(--red-600);
  --danger-bg: var(--red-050);
  --danger-border: var(--red-100);
  --info: var(--navy-600);
  --info-bg: var(--navy-050);
  --info-border: var(--navy-100);
}
/* Across the Table — Typography tokens */
:root {
  --font-display: 'Schibsted Grotesk', 'Segoe UI', system-ui, sans-serif;
  --font-sans: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, 'SFMono-Regular', monospace;

  /* Weights */
  --fw-regular: 400;   /* @kind font */
  --fw-medium: 500;    /* @kind font */
  --fw-semibold: 600;  /* @kind font */
  --fw-bold: 700;      /* @kind font */
  --fw-extrabold: 800; /* @kind font */

  /* Type scale (1.25 major-third-ish, tuned) */
  --text-xs: 0.75rem;     /* 12 */
  --text-sm: 0.875rem;    /* 14 */
  --text-base: 1rem;      /* 16 */
  --text-md: 1.125rem;    /* 18 */
  --text-lg: 1.375rem;    /* 22 */
  --text-xl: 1.75rem;     /* 28 */
  --text-2xl: 2.25rem;    /* 36 */
  --text-3xl: 2.875rem;   /* 46 */
  --text-4xl: 3.75rem;    /* 60 */
  --text-5xl: 4.75rem;    /* 76 */

  /* Line heights */
  --leading-tight: 1.08;
  --leading-snug: 1.22;
  --leading-normal: 1.5;
  --leading-relaxed: 1.65;

  /* Letter spacing */
  --tracking-tight: -0.02em;
  --tracking-snug: -0.01em;
  --tracking-normal: 0;
  --tracking-wide: 0.04em;
  --tracking-caps: 0.08em;
}
/* Across the Table — Spacing, radii, sizing tokens (4px base) */
:root {
  --space-0: 0;
  --space-1: 0.25rem;   /* 4 */
  --space-2: 0.5rem;    /* 8 */
  --space-3: 0.75rem;   /* 12 */
  --space-4: 1rem;      /* 16 */
  --space-5: 1.5rem;    /* 24 */
  --space-6: 2rem;      /* 32 */
  --space-7: 2.5rem;    /* 40 */
  --space-8: 3rem;      /* 48 */
  --space-9: 4rem;      /* 64 */
  --space-10: 5rem;     /* 80 */
  --space-12: 7rem;     /* 112 */

  /* Radii — restrained, established feel */
  --radius-xs: 4px;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --radius-pill: 999px;

  /* Container widths */
  --container-narrow: 720px;
  --container: 1080px;
  --container-wide: 1280px;

  /* Control heights */
  --control-sm: 34px;
  --control-md: 42px;
  --control-lg: 52px;
}
/* Across the Table — Elevation (warm-tinted, restrained) & motion */
:root {
  --shadow-xs: 0 1px 2px rgba(20, 32, 46, 0.06);
  --shadow-sm: 0 1px 3px rgba(20, 32, 46, 0.08), 0 1px 2px rgba(20, 32, 46, 0.05);
  --shadow-md: 0 4px 12px rgba(20, 32, 46, 0.08), 0 2px 4px rgba(20, 32, 46, 0.05);
  --shadow-lg: 0 12px 28px rgba(20, 32, 46, 0.12), 0 4px 8px rgba(20, 32, 46, 0.06);
  --shadow-xl: 0 24px 56px rgba(11, 22, 35, 0.18);
  --shadow-focus: 0 0 0 3px rgba(200, 150, 46, 0.35);
  --shadow-card-hover: 0 10px 24px rgba(20, 32, 46, 0.10);

  --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1); /* @kind other */
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1); /* @kind other */
  --dur-fast: 130ms; /* @kind other */
  --dur-base: 200ms; /* @kind other */
  --dur-slow: 320ms; /* @kind other */
}
/* Across the Table — light base layer for cards/specimens */
:root { color-scheme: light; }
.ds-reset, .ds-reset * { box-sizing: border-box; }
body.ds-card {
  margin: 0;
  font-family: var(--font-sans);
  color: var(--text-body);
  background: var(--bg-page);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* ---- app-level styles ---- */
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{font-family:var(--font-sans);color:var(--text-body);background:var(--cream-50);-webkit-font-smoothing:antialiased;}
#root{height:100%;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.att-fade{animation:fadeUp var(--dur-base,200ms) var(--ease-out,ease) both;}
.att-scroll::-webkit-scrollbar{width:10px;}
.att-scroll::-webkit-scrollbar-thumb{background:var(--sand-300);border-radius:99px;border:3px solid var(--cream-50);}
textarea,input,select,button{font-family:var(--font-sans);}
</style>
</head>
<body>
<div id="root"></div>

<!-- runtime.js defines DCLogic (base) first; app.logic.js extends it; boot is deferred to DOMContentLoaded -->
<script src="runtime.js"></script>
<script src="app.logic.js"></script>
<script src="render.js"></script>
</body>
</html>
