import React from 'react';
import { ScrollView, Text, StyleSheet } from 'react-native';
import { color, font } from '../../theme/tokens';
import { Eyebrow, H1, Card, Tag } from '../../components/ui';
import { legalDocs } from '../../content';

export default function LegalScreen() {
  return (
    <ScrollView contentContainerStyle={st.wrap}>
      <Eyebrow>Legal & licensing</Eyebrow>
      <H1 style={{ fontSize: 28, marginVertical: 12 }}>The fine print.</H1>
      {legalDocs.map((d) => (
        <Card key={d.title} style={{ marginBottom: 14 }}>
          <Text style={st.title}>{d.title}</Text>
          <Tag>{d.updated}</Tag>
          {d.paras.map((p, i) => <Text key={i} style={st.para}>{p}</Text>)}
        </Card>
      ))}
    </ScrollView>
  );
}
const st = StyleSheet.create({
  wrap: { padding: 22, maxWidth: 760, width: '100%', alignSelf: 'center' },
  title: { fontFamily: font.display, fontSize: 18, color: color.navy700 },
  para: { fontFamily: font.body, fontSize: 14, color: color.ink700, lineHeight: 21, marginTop: 10 },
});
